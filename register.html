<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanIt - Registrieren</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .field-error {
            color: var(--color-red);
            font-size: 0.8rem;
            margin-top: 0.25rem;
            display: none;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-box">

        <div class="login-logo">PlanIt</div>
        <div class="login-subtitle">Neues Konto erstellen</div>

        <div class="form-group" style="margin-top:1.5rem;">
            <label>Restaurant-Name</label>
            <input type="text" id="reg-restaurant" placeholder="z.B. Pizzeria Roma">
            <div class="field-error" id="err-restaurant"></div>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="reg-email" placeholder="admin@restaurant.de">
            <div class="field-error" id="err-email"></div>
        </div>
        <div class="form-group">
            <label>Passwort</label>
            <input type="password" id="reg-password" placeholder="Mind. 8 Zeichen, Groß-, Zahl, Sonderzeichen">
            <div class="field-error" id="err-password"></div>
        </div>
        <div class="form-group">
            <label>Passwort wiederholen</label>
            <input type="password" id="reg-password2" placeholder="Passwort bestätigen">
            <div class="field-error" id="err-password2"></div>
        </div>

        <div id="reg-error" style="color:var(--color-red); font-size:0.85rem; margin-bottom:1rem; display:none;"></div>
        <div id="reg-success" style="color:var(--color-primary); font-size:0.85rem; margin-bottom:1rem; display:none;"></div>

        <button class="btn-primary" onclick="register()">Registrieren</button>

        <div style="text-align:center; margin-top:1.25rem; font-size:0.85rem; color:var(--color-text-light);">
            Bereits ein Konto? <a href="index.html" style="color:var(--color-primary); text-decoration:none;">Jetzt einloggen</a>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://ulazvcrpasnhufzlywxf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsYXp2Y3JwYXNuaHVmemx5d3hmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA5NTI3NzAsImV4cCI6MjA3NjUyODc3MH0.RDyhW1CILNSH2KL77ftx0vYlbwgNOQuNVgkYMcqhi0M';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function showFieldError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
}

function clearFieldErrors() {
    document.querySelectorAll('.field-error').forEach(el => {
        el.textContent = '';
        el.style.display = 'none';
    });
    document.getElementById('reg-error').style.display = 'none';
}

function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function validatePassword(pw) {
    if (pw.length < 8) return 'Passwort muss mindestens 8 Zeichen haben.';
    if (!/[A-Z]/.test(pw)) return 'Passwort muss mindestens einen Großbuchstaben enthalten.';
    if (!/[0-9]/.test(pw)) return 'Passwort muss mindestens eine Zahl enthalten.';
    if (!/[^A-Za-z0-9]/.test(pw)) return 'Passwort muss mindestens ein Sonderzeichen enthalten.';
    return null;
}

window.register = async function() {
    const restaurant = document.getElementById('reg-restaurant').value.trim();
    const email      = document.getElementById('reg-email').value.trim();
    const password   = document.getElementById('reg-password').value;
    const password2  = document.getElementById('reg-password2').value;
    const successDiv = document.getElementById('reg-success');

    clearFieldErrors();
    successDiv.style.display = 'none';

    let valid = true;

    if (restaurant.length < 3) {
        showFieldError('err-restaurant', 'Restaurant-Name muss mindestens 3 Zeichen haben.');
        valid = false;
    }
    if (!email) {
        showFieldError('err-email', 'Bitte eine Email-Adresse eingeben.');
        valid = false;
    } else if (!validateEmail(email)) {
        showFieldError('err-email', 'Bitte eine gültige Email-Adresse eingeben.');
        valid = false;
    }
    const pwError = validatePassword(password);
    if (pwError) {
        showFieldError('err-password', pwError);
        valid = false;
    }
    if (!password2) {
        showFieldError('err-password2', 'Bitte das Passwort wiederholen.');
        valid = false;
    } else if (password !== password2) {
        showFieldError('err-password2', 'Passwörter stimmen nicht überein.');
        valid = false;
    }

    if (!valid) return;

    const { data, error } = await db.auth.signUp({ email, password });
    if (error) {
        const errorDiv = document.getElementById('reg-error');
        errorDiv.textContent = error.message;
        errorDiv.style.display = 'block';
        return;
    }

    const userId = data.user?.id;
    if (userId) {
        const { error: dbError } = await db
            .from('planit_restaurants')
            .insert({ user_id: userId, name: restaurant });
        if (dbError) {
            const errorDiv = document.getElementById('reg-error');
            errorDiv.textContent = 'Konto erstellt, aber Restaurant-Name konnte nicht gespeichert werden: ' + dbError.message;
            errorDiv.style.display = 'block';
            return;
        }
    }

    successDiv.textContent = 'Registrierung erfolgreich! Bitte prüfe deine Email und klicke auf den Bestätigungslink um dich anzumelden.';
    successDiv.style.display = 'block';
};

document.addEventListener('keydown', e => {
    if (e.key === 'Enter') window.register();
});
</script>

</body>
</html>
