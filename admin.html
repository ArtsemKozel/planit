<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanIt - Admin</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="header-logo">PlanIt Admin</div>
    <button class="btn-logout" onclick="logout()" title="Logout">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
    </button>
</div>

<!-- BOTTOM NAVIGATION -->
<div class="bottom-nav">
    <button class="bottom-nav-item active" onclick="switchTab('schichtplanung')" id="nav-schichtplanung">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Planung</span>
    </button>
    <button class="bottom-nav-item" onclick="switchTab('urlaub')" id="nav-urlaub">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        <span>Urlaub</span>
    </button>
    <button class="bottom-nav-item" onclick="switchTab('team')" id="nav-team">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Team</span>
    </button>
    <button class="bottom-nav-item" onclick="switchTab('mehr')" id="nav-mehr">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
        <span>Mehr</span>
    </button>
</div>

<!-- MAIN -->
<div class="main-content" style="max-width:900px;">

    <!-- TAB 1: SCHICHTPLANUNG -->
    <div id="tab-schichtplanung" class="tab-content active">
        <div class="month-selector">
            <button onclick="changeWeek(-1)">◀</button>
            <span id="week-label"></span>
            <button onclick="changeWeek(1)">▶</button>
        </div>
        <div style="overflow-x:auto;">
            <div id="week-grid" class="week-grid"></div>
        </div>
    </div>

    <!-- TAB 2: URLAUB -->
    <div id="tab-urlaub" class="tab-content">
        <!-- Kalender -->
        <div class="section-title">Urlaubskalender</div>
        <div class="month-selector">
            <button onclick="changeAdminVacCalMonth(-1)">◀</button>
            <span id="admin-vac-cal-month-label"></span>
            <button onclick="changeAdminVacCalMonth(1)">▶</button>
        </div>
        <div id="admin-vac-calendar"></div>

        <!-- Anträge -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin:1.5rem 0 1rem;">
            <div class="section-title" style="margin-bottom:0;">Urlaubsanträge</div>
            <button class="btn-primary" style="width:auto;" onclick="downloadAllVacations()">⬇ Alle</button>
        </div>
        <div id="admin-vacation-list">
            <div class="empty-state"><p>Keine Anträge vorhanden.</p></div>
        </div>
    </div>

    <!-- TAB 3: VERFÜGBARKEITEN -->
    <div id="tab-verfuegbarkeit" class="tab-content">
        <div class="section-title">Verfügbarkeiten</div>
        <div class="form-group" style="max-width:300px;">
            <label>Mitarbeiter</label>
            <select id="avail-employee-select" onchange="loadAdminAvailability()"></select>
        </div>
        <div class="month-selector">
            <button onclick="changeAdminAvailMonth(-1)">◀</button>
            <span id="admin-avail-month-label"></span>
            <button onclick="changeAdminAvailMonth(1)">▶</button>
        </div>
        <div id="admin-avail-grid" class="availability-grid"></div>
    </div>

    <!-- TAB 4: TEAM -->
    <div id="tab-team" class="tab-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
            <div class="section-title" style="margin-bottom:0;">Team-Übersicht</div>
            <button class="btn-primary" style="width:auto;" onclick="openNewEmployeeModal()">+ Mitarbeiter</button>
        </div>
        <div id="team-list">
            <div class="empty-state"><p>Keine Mitarbeiter vorhanden.</p></div>
        </div>
    </div>

    <!-- TAB 5: SCHICHTTAUSCH -->
    <div id="tab-tausch" class="tab-content">
        <div class="section-title">Schichttausch-Requests</div>
        <div id="admin-swap-list">
            <div class="empty-state"><p>Keine Requests vorhanden.</p></div>
        </div>
    </div>

    <!-- TAB: MEHR -->
    <div id="tab-mehr" class="tab-content">
        <div class="section-title">Mehr</div>
        <div class="mehr-list">
            <div class="mehr-item" onclick="switchTab('verfuegbarkeit')">
                <span>Verfügbarkeiten</span>
                <span>›</span>
            </div>
            <div class="mehr-item" onclick="switchTab('tausch')">
                <span>Schichttausch</span>
                <span>›</span>
            </div>
        </div>
    </div>

</div>

<!-- MODAL: SCHICHT ERSTELLEN -->
<div id="shift-modal" class="modal-overlay">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="shift-modal-title">Schicht erstellen</div>
            <button class="modal-close" onclick="closeShiftModal()">✕</button>
        </div>
        <div class="form-group">
            <label>Mitarbeiter</label>
            <select id="shift-employee"></select>
        </div>
        <div class="form-group">
            <label>Datum</label>
            <input type="date" id="shift-date">
        </div>
        <div class="form-group">
            <label>Von</label>
            <input type="time" id="shift-start">
        </div>
        <div class="form-group">
            <label>Bis</label>
            <input type="time" id="shift-end">
        </div>
        <div class="form-group">
            <label>Pause (Minuten)</label>
            <input type="number" id="shift-break" placeholder="z.B. 30" min="0">
        </div>
        <div class="form-group">
            <label>Notizen (optional)</label>
            <textarea id="shift-notes" rows="2"></textarea>
        </div>
        <div id="shift-error" style="color:var(--color-red); font-size:0.85rem; margin-bottom:1rem; display:none;"></div>
        <button class="btn-primary" onclick="submitShift()">Schicht speichern</button>
    </div>
</div>

<!-- MODAL: NEUER MITARBEITER -->
<div id="employee-modal" class="modal-overlay">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title">Neuer Mitarbeiter</div>
            <button class="modal-close" onclick="closeNewEmployeeModal()">✕</button>
        </div>
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="new-emp-name" placeholder="Max Mustermann" oninput="previewLoginCode()">
        </div>
        <div class="form-group">
            <label>Login-Kürzel (auto-generiert)</label>
            <input type="text" id="new-emp-code" placeholder="z.B. MaMu" readonly style="background:#F5F5F5; color:#999;">
        </div>
        <div class="form-group">
            <label>Passwort</label>
            <input type="text" id="new-emp-password" placeholder="Initial-Passwort">
        </div>
        <div class="form-group">
            <label>Abteilung</label>
            <select id="new-emp-department">
                <option value="Allgemein">Allgemein</option>
                <option value="Küche">Küche</option>
                <option value="Service">Service</option>
                <option value="Bar">Bar</option>
            </select>
        </div>
        <div id="emp-modal-error" style="color:var(--color-red); font-size:0.85rem; margin-bottom:1rem; display:none;"></div>
        <button class="btn-primary" onclick="submitNewEmployee()">Mitarbeiter anlegen</button>
    </div>
</div>

<!-- MODAL: URLAUB ABLEHNEN -->
<div id="reject-modal" class="modal-overlay">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title">Antrag ablehnen</div>
            <button class="modal-close" onclick="closeRejectModal()">✕</button>
        </div>
        <div class="form-group">
            <label>Grund der Ablehnung</label>
            <textarea id="reject-reason" rows="3" placeholder="z.B. Anderer Mitarbeiter hat in dieser Zeit Urlaub"></textarea>
        </div>
        <button class="btn-primary" onclick="submitReject()">Ablehnen</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/auth.js"></script>
<script src="js/admin.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</body>
</html>
